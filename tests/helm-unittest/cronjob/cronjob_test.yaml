suite: cronjob
templates:
  - templates/cronjob.yaml
values:
  - ../common/base.yaml

tests:
  - it: renders a CronJob with the expected identity
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: CronJob
      - equal:
          path: metadata.name
          value: test-cronjob
      - equal:
          path: metadata.namespace
          value: test-namespace

  - it: renders the configured CronJob schedule
    asserts:
      - equal:
          path: spec.schedule
          value: "0 * * * *"

  - it: binds the service account and renders configured resources
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.serviceAccountName
          value: test-cronjob
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.requests.memory
          value: 128Mi
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.limits.cpu
          value: 200m
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi
