# Campo "cronjob.schedule" assente -> violazione JSON schema (cronjob required: [schedule])
#
# Errore atteso da helm lint / helm template:
#   [ERROR] values.yaml: cronjob: schedule is required
#
# helm template charts/interop-eks-cronjob-chart -f tests/general/failure/schema-missing-schedule.yaml
# Atteso: exit code != 0

name: test-cronjob
namespace: test-ns

serviceAccount:
  roleArn: "arn:aws:iam::123456789012:role/test-role"

cronjob:
  schedule: #intenzionalmente omesso
  image:
    repositoryPrefix: my-registry.example.com
    tag: "1.0.0"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  flywayInitContainer:
    create: false
