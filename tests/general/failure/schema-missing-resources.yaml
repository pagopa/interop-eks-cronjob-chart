# Errore atteso da helm lint / helm template:
#   [ERROR] values.yaml: cronjob: resources is required
#
# helm template charts/interop-eks-cronjob-chart -f tests/general/failure/schema-missing-resources.yaml
# Atteso: exit code != 0

name: test-cronjob
namespace: test-ns

serviceAccount:
  roleArn: "arn:aws:iam::123456789012:role/test-role"

cronjob:
  schedule: "0 * * * *"
  image:
    repositoryPrefix: my-registry.example.com
    tag: "1.0.0"
  resources: #intenzionalmente omesso
  flywayInitContainer:
    create: false
