# envFromSecrets: valore senza separatore "."
#
# helm template charts/interop-eks-cronjob-chart -f tests/flyway-init-container/base-values.yaml -f tests/flyway-init-container/failure/env-secret-no-dot.yaml
#
# deve restituire errore perché il formato è errato: manca il "." per separare nome secret e chiave. Il template deve fallire con un messaggio di errore che indica che il formato è errato

cronjob:
  flywayInitContainer:
    create: true
    image:
      repositoryName: interop-flyway-migrations
    executeFlywayMigrate: true
    envFromSecrets:
      DB_PASSWORD: "secret-name-without-dot-separator"    # formato errato: manca il "."
