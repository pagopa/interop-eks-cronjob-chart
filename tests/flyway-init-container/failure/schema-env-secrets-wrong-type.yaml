# flywayInitContainer.envFromSecrets impostato come lista invece di object
#            -> violazione JSON schema (type: object)
#
# Errore atteso da helm lint / helm template:
#   [ERROR] values.yaml: cronjob.flywayInitContainer.envFromSecrets: Invalid type.
#           Expected: object, given: array
#
# helm template charts/interop-eks-cronjob-chart -f tests/flyway-init-container/base-values.yaml -f tests/flyway-init-container/failure/schema-env-secrets-wrong-type.yaml
# Atteso: exit code != 0

cronjob:
  flywayInitContainer:
    create: true
    image:
      repositoryName: interop-flyway-migrations
    executeFlywayMigrate: true
    envFromSecrets:             # lista invece di map key/value -> tipo errato
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: db-secret
            key: PASSWORD
