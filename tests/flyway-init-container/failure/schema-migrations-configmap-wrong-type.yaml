# migrationsConfigmap impostato come intero invece di stringa
#
# helm template charts/interop-eks-cronjob-chart -f tests/flyway-init-container/base-values.yaml -f tests/flyway-init-container/failure/schema-migrations-configmap-wrong-type.yaml

cronjob:
  flywayInitContainer:
    create: true
    image:
      repositoryName: interop-flyway-migrations
    executeFlywayMigrate: true
    migrationsConfigmap: 9999    # intero invece di stringa → tipo errato
