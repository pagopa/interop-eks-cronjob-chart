# flywayInitContainer.envFromSecrets -> secretKeyRef nell'env dell'initContainer
# Verifica: la variabile DB_PASSWORD deve comparire nell'env come secretKeyRef
#           con name: db-secret e key: PASSWORD.
#
# helm template charts/interop-eks-cronjob-chart -f tests/flyway-init-container/base-values.yaml -f tests/flyway-init-container/success/env-from-secrets.yaml
#
# Verifica manuale output (blocco initContainers > env):
#   | grep "DB_PASSWORD" -A4 -> deve mostrare secretKeyRef con name: db-secret, key: PASSWORD

cronjob:
  flywayInitContainer:
    create: true
    image:
      repositoryName: interop-flyway-migrations
    executeFlywayMigrate: true
    envFromSecrets:
      DB_PASSWORD: "db-secret.PASSWORD"
