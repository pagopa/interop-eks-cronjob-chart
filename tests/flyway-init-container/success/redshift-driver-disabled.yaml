# downloadRedshiftDriver=false (default) -> INTERNAL_DOWNLOAD_REDSHIFT_DRIVER="false"
# Verifica: env var INTERNAL_DOWNLOAD_REDSHIFT_DRIVER deve avere valore "false".
#
# helm template charts/interop-eks-cronjob-chart -f tests/flyway-init-container/base-values.yaml -f tests/flyway-init-container/success/ts-11-redshift-driver-disabled.yaml
#
# Verifica manuale output:
#   | grep "INTERNAL_DOWNLOAD_REDSHIFT_DRIVER" -A1 -> deve mostrare value: "false"

cronjob:
  flywayInitContainer:
    create: true
    image:
      repositoryName: interop-flyway-migrations
    executeFlywayMigrate: true
    downloadRedshiftDriver: false
