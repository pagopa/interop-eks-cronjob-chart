# Default values for interop-eks-cronjob-chart.

# -- Name of the service that will be deployed on K8s cluster
name:
# -- Namespace hosting the service that will be deployed on K8s cluster
namespace:

serviceAccount:
  # -- (string) Optional IAM Role ARN for ServiceAccount annotation eks.amazonaws.com/role-arn (supports templating)
  roleArn:

cronjob:
  # -- (object) Cronjob image configuration
  image:
    # -- (string) Image pull policy
    imagePullPolicy: Always
    # -- (string) Image repository
    repositoryPrefix:
    # -- (string) Alternative image name
    repositoryName:
    # -- (string) Image tag
    tag:
    # -- (string) Image digest
    digest:
  # -- K8s container resources requests and limits
  resources:
    requests:
      cpu:
      memory:
    limits:
      cpu:
      memory:

  flywayInitContainer:
    create: false
    image:
      # -- (string) defaults to deployment repositoryPrefix if not set
      repositoryPrefix:
      # -- (string) must be set if create is true, e.g. "interop-flyway-migrations"
      repositoryName:
      # -- (string) defaults to deployment image tag if not set
      tag:
      # -- (string) if set, overrides tag with the specified digest
      digest:
    # -- (bool) execute Flyway migrate command to apply migrations to the database
    executeFlywayMigrate: true
    # -- (bool) downloadRedshiftDriver: if true, the init container will download the Redshift JDBC driver from the official AWS S3 bucket and place it in the Flyway drivers directory before executing any Flyway command. This is required when using Flyway with Redshift, as the driver is not included in the default Flyway image.
    downloadRedshiftDriver: false
    # -- (bool) execute Flyway repair command to recompute applied migrations checksum metadata; useful for whitespace changes
    executeFlywayRepair: false
    # -- Configmap with migrations
    migrationsConfigmap:
    # -- (string) List of comma separated paths to migration files or directories containing migration files (e.g. "/migrations/a_directory,v1_migration.sql,/migrations/b_directory")
    migrationPaths:
    # -- (object) List of environment variables for a container, specifying a value directly for each named variable
    env: {}
    # -- (object) List of environment variables for a container, specifying a key from a Configmap for each named variable (k8s equivalent of envFrom.configMapRef)
    envFromConfigmaps: {}
    # -- (object) List of environment variables for a container, specifying a key from a Secret for each named variable (k8s equivalent of envFrom.secretRef)
    envFromSecrets: {}
    # -- (object) List of pod fields used as values for environment variablesenvironment variables for a container, specifying a key from a Secret for each named variable (k8s equivalent of env.valueFrom.fieldRef.fieldPath)
    envFromFieldRef: {}

  # -- [automountServiceAccountToken](https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/#use-the-default-service-account-to-access-the-api-server)
  # @default -- true
  automountServiceAccountToken: true
  # -- [failedJobsHistoryLimit](https://kubernetes.io/docs/concepts/workloads/controllers/cron-jobs/#jobs-history-limits) field specifies the number of failed finished jobs to keep. Setting this field to 0 will not keep any failed jobs.
  # @default -- 1
  failedJobsHistoryLimit: 1
  # -- [successfulJobsHistoryLimit](https://kubernetes.io/docs/concepts/workloads/controllers/cron-jobs/#jobs-history-limits) field specifies the number of successful finished jobs to keep. Setting this field to 0 will not keep any successful jobs
  # @default -- 0
  successfulJobsHistoryLimit: 0
  # -- (boolean) [suspend](https://kubernetes.io/docs/concepts/workloads/controllers/cron-jobs/#schedule-suspension) field allows to suspend execution of Jobs for a CronJob.
  # @default -- false.
  suspend: false
  # -- (int) The activeDeadlineSeconds applies to the duration of the job, no matter how many Pods are created. Once a Job reaches activeDeadlineSeconds, all of its running Pods are terminated.
  # @default -- 3600
  activeDeadlineSeconds: 3600
  # -- (string) [Time zone](https://kubernetes.io/docs/concepts/workloads/controllers/cron-jobs/#time-zones) to use when calculating schedule
  timeZone:
  # -- (string) The [schedule](https://kubernetes.io/docs/concepts/workloads/controllers/cron-jobs/#schedule-syntax) field is required. The value of that field follows the [Cron](https://en.wikipedia.org/wiki/Cron) syntax.
  schedule:
  # -- (string) [concurrencyPolicy](https://kubernetes.io/docs/concepts/workloads/controllers/cron-jobs/#concurrency-policy) field specifies how to treat concurrent executions of a Job that is created by this CronJob.
  # @default -- Allow
  concurrencyPolicy:
  restartPolicy: OnFailure
  # -- (int) [backoffLimit](https://kubernetes.io/docs/concepts/workloads/controllers/job/#handling-pod-and-container-failures) the number of retries before marking a Job as failed.
  backoffLimit: 6
  # -- (object) List of environment variables for a container, specifying a value directly for each named variable
  env:
  # -- (object) List of environment variables for a container, specifying a key from a Configmap for each named variable (k8s equivalent of envFrom.configMapRef)
  envFromConfigmaps:
  # -- (object) List of environment variables for a container, specifying a key from a Secret for each named variable (k8s equivalent of envFrom.secretRef)
  envFromSecrets:
  # -- (object) List of pod fields used as values for environment variablesenvironment variables for a container, specifying a key from a Secret for each named variable (k8s equivalent of env.valueFrom.fieldRef.fieldPath)
  envFromFieldRef:


externalSecrets:
  # -- (bool) Enable ExternalSecret creation
  create: false
  # -- (string) Refresh interval for the secret (e.g., "1h", "30m")
  refreshInterval: "0"
  # -- (string) Refresh policy for the secret, allowed values: [ "OnChange", "Interval" ]
  refreshPolicy: "OnChange"
  # -- (object) Reference to SecretStore or ClusterSecretStore
  secretStoreRef:
    name: ""
    kind: SecretStore  # or ClusterSecretStore
  # -- (object) Target Kubernetes Secret configuration
  targetSecret:
    # -- (string) Name of the target secret (defaults to cronjob name)
    name: ""
    # -- (string) Creation policy: Owner, Orphan, Merge, None
    creationPolicy: Merge
    # -- (string) Deletion policy: Retain, Delete
    deletionPolicy: Retain
  # -- (list) List of individual secret keys to sync from external secret manager
  data: []
    # - secretKey: username
    #   remoteRef:
    #     key: /path/to/secret
    #     property: username
    #     version: v1                       # (string) Version identifier for the remote secret
    #     conversionStrategy: Default
    #     decodingStrategy: None
    # - secretKey: password
    #   remoteRef:
    #     key: /path/to/secret
    #     property: password
    #     version: v1
  # dataFrom fetches all key/value pairs from an external source without mapping individual keys.
  # It can be used alongside `data` (in case of key collisions, `data` takes precedence).
  # Each entry supports exactly one of the following mutually exclusive fields:
  #
  # 1. extract: fetches all key/value pairs from a single specific secret.
  #    Helm template expressions are supported in: key, property.
  # dataFrom:
  #   - extract:
  #       key: my-app/production/config   # required
  #       version: AWSCURRENT             # optional
  #       property: ""                    # optional
  #       conversionStrategy: Default     # optional (Default | Unicode | PascalCase | CamelCase | UpperCase | LowerCase)
  #       decodingStrategy: None          # optional (None | Base64 | Base64URL | Auto)
  #       metadataPolicy: None            # optional (None | Fetch)
  #     rewrite:                          # optional: transforms the resulting key names
  #       - regexp:
  #           source: "my-app/(.*)"
  #           target: "$1"
  #
  # 2. find: searches for multiple secrets by name (regexp) or tags/metadata.
  #    Helm template expressions are supported in: path.
  # dataFrom:
  #   - find:
  #       path: "my-app/"                 # optional: search path prefix
  #       name:                           # optional: filter by name
  #         regexp: "^my-app/prod/.*"
  #       tags:                           # optional: filter by tags
  #         environment: production
  #       conversionStrategy: Default     # optional
  #       decodingStrategy: None          # optional
  #     rewrite:
  #       - regexp:
  #           source: "my-app/prod/(.*)"
  #           target: "$1"
  #
  # 3. sourceRef.generatorRef: fetches values from a Generator resource (e.g. ECRAuthorizationToken, Password, etc.).
  #    Helm template expressions are supported in: sourceRef.generatorRef.name.
  # dataFrom:
  #   - sourceRef:
  #       generatorRef:
  #         apiVersion: generators.external-secrets.io/v1alpha1
  #         kind: Password
  #         name: my-password-generator
  dataFrom: null
