{{- if .Values.externalSecrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "interop-eks-cronjob-chart.render-template" (dict "value" (.Values.externalSecrets.targetSecret.name | default .Values.name) "context" $) }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "interop-eks-cronjob-chart.labels" . | nindent 4 }}
  annotations:
    externalsecret/secret-data-hash: {{ include "externalsecrets.contractMarker" . }}
type: Opaque
stringData: {}
{{- end }}

